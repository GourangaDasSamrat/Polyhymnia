name: Docker Compose Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  issues: write

jobs:
  compose-check:
    runs-on: ubuntu-latest
    env:
      ISSUE_LABEL: ci:docker-compose
      ISSUE_MARKER: "<!-- docker-compose-ci:auto -->"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Start Docker Compose stack
        shell: bash
        run: |
          set -euo pipefail
          docker compose -f docker-compose.yml up --build -d
          sleep 20
          docker compose -f docker-compose.yml ps --all

      - name: Validate service status
        id: validate
        shell: bash
        run: |
          set -euo pipefail
          STATUS_OUTPUT="$(docker compose -f docker-compose.yml ps --all)"
          echo "$STATUS_OUTPUT"

          if echo "$STATUS_OUTPUT" | grep -Eiq "unhealthy|Exited|Dead|Restarting"; then
            {
              echo "### docker compose ps --all"
              echo "```"
              echo "$STATUS_OUTPUT"
              echo "```"
              echo
              echo "### docker compose logs --no-color --tail=200"
              echo "```"
              docker compose -f docker-compose.yml logs --no-color --tail=200 || true
              echo "```"
            } > compose_failure_report.md

            exit 1
          fi

      - name: Build fallback failure report
        if: failure()
        shell: bash
        run: |
          if [ ! -f compose_failure_report.md ]; then
            {
              echo "### docker compose ps --all"
              echo "```"
              docker compose -f docker-compose.yml ps --all || true
              echo "```"
              echo
              echo "### docker compose logs --no-color --tail=200"
              echo "```"
              docker compose -f docker-compose.yml logs --no-color --tail=200 || true
              echo "```"
            } > compose_failure_report.md
          fi

      - name: Upload failure report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-failure-report
          path: compose_failure_report.md

      - name: Ensure failure label exists
        if: failure() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: actions/github-script@v7
        with:
          script: |
            const label = process.env.ISSUE_LABEL;
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
              });
            } catch (error) {
              if (error.status !== 404) throw error;
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: label,
                color: "B60205",
                description: "Failures from Docker Compose CI workflow",
              });
            }

      - name: Create or update failure issue
        if: failure() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const label = process.env.ISSUE_LABEL;
            const marker = process.env.ISSUE_MARKER;
            const branch = context.ref.replace("refs/heads/", "");
            const title = `[docker-compose-ci] Failure on ${branch}`;

            const report = fs.existsSync("compose_failure_report.md")
              ? fs.readFileSync("compose_failure_report.md", "utf8")
              : "Compose check failed, but no detailed report was generated.";

            const body = [
              marker,
              "",
              `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `Commit: ${context.sha}`,
              "",
              "The Docker Compose check failed.",
              "",
              report,
            ].join("\n");

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: label,
              per_page: 100,
            });

            const existing = openIssues.find(
              (issue) => issue.title === title && issue.body && issue.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: [
                  "Another Docker Compose failure was detected.",
                  "",
                  `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
                  "",
                  report,
                ].join("\n"),
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: [label],
              });
            }

      - name: Close auto-opened failure issues after success
        if: success() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository)
        uses: actions/github-script@v7
        with:
          script: |
            const label = process.env.ISSUE_LABEL;
            const marker = process.env.ISSUE_MARKER;

            const { data: openIssues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: label,
              per_page: 100,
            });

            for (const issue of openIssues) {
              if (!issue.body || !issue.body.includes(marker)) {
                continue;
              }

              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: "Docker Compose check is passing again. Closing this auto-generated issue.",
              });

              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: "closed",
              });
            }

      - name: Tear down Docker Compose stack
        if: always()
        shell: bash
        run: |
          docker compose -f docker-compose.yml down --volumes --remove-orphans || true
