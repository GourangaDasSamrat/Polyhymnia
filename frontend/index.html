<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Polyhymnia — The Ultimate Overengineered Quote Generator</title>
    <link
      rel="shortcut icon"
      href="https://static.cdnlogo.com/logos/g/35/galaxy.svg"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="card">
      <p class="eyebrow">Polyhymnia</p>
      <h1>Random Quote Generator</h1>
      <p class="subtitle">
        One button. Five services. Two languages more than necessary.
      </p>

      <blockquote id="quote-text">
        Click the button. Trust the pipeline.
      </blockquote>
      <p id="quote-author" class="author"></p>

      <button id="get-quote-btn" type="button">Get Quote</button>
      <p id="status" class="status" role="status" aria-live="polite"></p>
    </main>

    <script src="app.js"></script>
  </body>
</html>
